<!DOCTYPE html>
<html>
<head>
  <title>Sandlin Flights ✈️💍</title>

  <!-- Keep your cute styling -->
  <style>
    body {
      margin: 0;
      background: linear-gradient(to bottom, #fff0f5, #ffe4e1);
      font-family: "Comic Sans MS", cursive, sans-serif;
      text-align: center;
    }

    h1 {
      font-size: 3em;
      color: #ff4d6d;
      margin-bottom: 10px;
      animation: bounce 1.5s infinite;
    }

    img {
      max-width: 80%;
      max-height: 60vh;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .hearts {
      position: absolute;
      top: 10px;
      width: 100%;
      font-size: 2em;
      animation: float 3s ease-in-out infinite;
    }

    section {
      margin: 40px auto;
      max-width: 1000px;
    }

    #map {
      height: 400px;
      border-radius: 20px;
      margin-top: 20px;
    }

    table {
      width: 100%;
      background: white;
      border-radius: 15px;
      overflow: hidden;
      margin-top: 20px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #eee;
    }

    th {
      background: #ffccd5;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 15px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes float {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-50px); opacity: 0; }
    }
  </style>

  <!-- Leaflet map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>

<body>

  <div class="hearts">💖 💕 💍 💖 💕</div>

  <h1>omg, ur getting married 💍✨</h1>

  <img src="sandlin.png" alt="Sandlin Flights">

  <!-- NEW: GROUPS -->
  <section>
    <h2>Arrival Groups</h2>
    <div id="groups"></div>
  </section>

  <!-- NEW: MAP -->
  <section>
    <h2>Flight Map</h2>
    <div id="map"></div>
  </section>

  <!-- NEW: TABLE -->
  <section>
    <h2>All Flights</h2>
    <div id="flightTable"></div>
  </section>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>

</body>
</html>
